<div id="editKosModal" class="fixed inset-0 bg-black bg-opacity-50 hidden justify-center items-center z-[9999] p-4">
    <div class="bg-white rounded-xl p-6 w-full max-w-md shadow-2xl">
        
        <div class="flex justify-between items-center mb-5">
            <h2 class="text-xl font-bold text-slate-800">Edit Data Kos</h2>
            <button onclick="closeModalEdit()" class="text-2xl text-slate-400 hover:text-slate-600">&times;</button>
        </div>
        
        <form id="formEditKos" class="space-y-4">
            <div>
                <label for="editNamaKos" class="block text-sm font-medium text-slate-700 mb-1">Nama Kos</label>
                <input type="text" id="editNamaKos" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            <div>
                <label for="editHargaKos" class="block text-sm font-medium text-slate-700 mb-1">Harga per Bulan</label>
                <input type="number" id="editHargaKos" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            <div>
                <label for="editLokasiKos" class="block text-sm font-medium text-slate-700 mb-1">Lokasi / Alamat</label>
                <textarea id="editLokasiKos" required rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
            </div>
            <button type="submit" class="w-full py-3 mt-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-lg transition-all duration-200">
                Simpan Perubahan
            </button>
        </form>
    </div>
</div>
