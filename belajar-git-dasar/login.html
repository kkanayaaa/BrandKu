<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Hunika</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 h-screen flex justify-center items-center">

    <div class="w-[400px] bg-white p-10 rounded-2xl shadow-lg">

        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-green-500">HUNIKA</h1>
            <p class="text-gray-500 mt-2">Masuk ke akun Anda</p>
        </div>

        <form action="search-kost.html" class="flex flex-col gap-3">

            <label class="font-medium">Email</label>
            <input
                type="email"
                placeholder="Masukkan Email"
                class="p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
            >

            <label class="font-medium">Password</label>
            <input
                type="password"
                placeholder="Masukkan Password"
                class="p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
            >

            <button
                type="submit"
                class="mt-2 bg-green-500 text-white py-3 rounded-lg hover:bg-green-600 transition duration-300"
            >
                Login
            </button>

            <p class="text-center mt-4">
                Belum punya akun?
                <a href="#" class="text-green-500 font-semibold hover:underline">
                    Daftar
                </a>
            </p>

        </form>

    </div>

</body>
</html>
